<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Contact – Complete Works by R. Setsuna</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #ffffff; --fg: #111111; --fg-soft: #555555; --rule: #e5e5e5; --accent: #4a90e2;
      --font-main: "Georgia", "Times New Roman", "Hiragino Mincho ProN", "MS Mincho", serif;
      --font-mono: "SF Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--font-main); -webkit-font-smoothing: antialiased; }
    body { background-color: #fcfcfc; min-height: 100vh; display: flex; justify-content: center; align-items: stretch; line-height: 2; letter-spacing: 0.03em; }
    main { width: 100%; max-width: 960px; padding: 48px 20px 64px; margin: 0 auto; animation: fadeIn 1.2s ease-out; }
    header { margin-bottom: 40px; text-align: center; }
    .brand { font-family: "Georgia", serif; font-size: 0.85rem; letter-spacing: 0.2em; color: var(--fg-soft); margin-bottom: 16px; text-transform: uppercase; }
    h1 { font-size: 1.9rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; margin: 0 0 10px; }
    .subtitle { font-size: 0.95rem; color: var(--fg-soft); line-height: 1.7; max-width: 34em; margin: 0 auto; font-style: italic; }
    .divider { border: none; border-top: 1px solid var(--rule); margin: 32px 0 28px; }
    section { margin-bottom: 32px; padding-bottom: 20px; }
    
    /* contact用に微調整したスタイル */
    .content-body { font-size: 0.95rem; color: var(--fg); max-width: 600px; margin: 0 auto; }
    .content-body p { margin-bottom: 1.5rem; }
    .content-body strong { font-weight: 500; color: var(--fg-soft); margin-right: 0.5em; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.05em; }
    .content-body a { color: var(--accent); text-decoration: none; border-bottom: 1px dashed var(--accent); transition: color 0.2s; }
    .content-body a:hover { color: var(--fg); border-bottom-color: var(--fg); }
    
    footer { margin-top: 60px; padding-top: 20px; border-top: 1px solid var(--rule); font-size: 0.75rem; color: var(--fg-soft); text-align: center; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<main>
  <header>
    <div class="brand">EXTERNAL RESONANCE</div>
    <h1>field</h1>
    <p class="subtitle"></p>
  </header>
  
  <hr class="divider">
  
  <section>
    <div class="content-body">
      <p>Academic references and related activities can be found at the links below.</p>
      <p><strong>ORCID:</strong> <a href="https://orcid.org/0009-0005-4578-1626" target="_blank">0009-0005-4578-1626</a></p>
      <p><strong>Publications distributed across:</strong> Google Play Books / Rakuten Kobo / Zenodo</p>
    </div>
  </section>

  <footer>
      <a href="index.html" style="color: var(--fg-soft); text-decoration: none;">Back to Home</a><br>
      © R. Setsuna Publishing. All Rights Reserved.
  </footer>
</main>
</body>
</html>
