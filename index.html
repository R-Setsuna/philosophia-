<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>外在的共鳴の哲学 – R. Setsuna</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #ffffff;
      --fg: #111111;
      --fg-soft: #555555;
      --rule: #e5e5e5;
      --accent: #4a90e2;
      --font-main: "Hiragino Sans", "Noto Sans JP", system-ui, sans-serif;
      --font-mono: "SF Mono", Menlo, Consolas, monospace;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-main);
      -webkit-font-smoothing: antialiased;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 60px;
    }

    .brand {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      color: var(--fg-soft);
      margin-bottom: 16px;
    }

    .hero-emblem {
      width: 120px;
      height: 120px;
      margin: 0 auto 28px;
      opacity: 0.9;
    }

    h1 {
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      margin: 0 0 12px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--fg-soft);
      line-height: 1.7;
      max-width: 32em;
      margin: 0 auto;
    }

    nav {
      margin-top: 48px;
      display: flex;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
    }

    nav a {
      font-size: 0.9rem;
      color: var(--fg);
      text-decoration: none;
      padding-bottom: 4px;
      border-bottom: 1px solid transparent;
      transition: 0.25s ease;
      letter-spacing: 0.05em;
    }

    nav a:hover {
      border-bottom: 1px solid var(--accent);
      color: var(--accent);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 60px 0 40px;
    }

    footer {
      margin-top: 60px;
      padding-top: 20px;
      border-top: 1px solid var(--rule);
      font-size: 0.75rem;
      color: var(--fg-soft);
      text-align: center;
    }
  </style>
</head>

<body>
<main>

  <header>
    <div class="brand">EXTERNAL RESONANCE</div>

    <!-- エンブレム画像 -->
    <img src="emblem.png" alt="Emblem" class="hero-emblem">

    <h1>R. Setsunaの公式ホームページ</h1>
    <p class="subtitle">
      外の風　内に響きて　たち返り<br>
      　　　　風となりては　外へ吹きゆく
    </p>

    <nav>
      <a href="Greeting.html">ご挨拶</a>
      <a href="works.html">著者自身の著書一覧</a>
      <a href="profile.html">著者プロフィール</a>
    </nav>
  </header>

  <hr class="divider">

  <footer>
    © R. Setsuna Publishing. All Rights Reserved.
  </footer>

</main>
</body>
</html>
